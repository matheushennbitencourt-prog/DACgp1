services:
  - type: web
    name: coursemapper-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node backend/server.cjs
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_BASE_URL
        value: /api
      - key: STORAGE_DRIVER
        value: postgres
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
